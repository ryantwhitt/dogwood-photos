<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin | Dogwood Photos</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --black: #0e0c0a;
      --white: #faf8f5;
      --blush: #E8C7C8;
      --blush-light: #f3e8e8;
      --blush-muted: #c9a8a8;
      --font-display: 'Great Vibes', cursive;
      --font-body: 'Montserrat', sans-serif;
    }

    body {
      font-family: var(--font-body);
      font-weight: 400;
      color: var(--black);
      background: var(--white);
      min-height: 100vh;
    }

    /* ===================== LOGIN ===================== */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--black);
    }

    .login-box {
      background: var(--white);
      padding: 3rem;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .login-box h1 {
      font-family: var(--font-display);
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .login-box p {
      font-weight: 300;
      font-size: 0.85rem;
      color: rgba(14,12,10,0.5);
      margin-bottom: 2rem;
    }

    .login-box input {
      width: 100%;
      padding: 0.8rem 1rem;
      font-family: var(--font-body);
      font-size: 0.9rem;
      border: 1px solid rgba(14,12,10,0.15);
      background: var(--white);
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .login-box input:focus {
      border-color: var(--blush-muted);
    }

    .login-error {
      color: #c0392b;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }

    /* ===================== ADMIN PANEL ===================== */
    #admin-panel { display: none; }

    .admin-header {
      background: var(--black);
      color: var(--white);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .admin-header h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
    }

    .admin-header .logout-btn {
      font-family: var(--font-body);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(250,248,245,0.6);
      background: none;
      border: 1px solid rgba(250,248,245,0.2);
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .admin-header .logout-btn:hover {
      color: var(--white);
      border-color: var(--blush);
    }

    .admin-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem;
    }

    .admin-section {
      margin-bottom: 3rem;
    }

    .admin-section h2 {
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blush-muted);
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid rgba(14,12,10,0.08);
    }

    /* Card editor */
    .card-editor {
      background: #fff;
      border: 1px solid rgba(14,12,10,0.08);
      padding: 1.5rem;
      margin-bottom: 1rem;
      transition: box-shadow 0.3s;
    }

    .card-editor:hover {
      box-shadow: 0 4px 20px rgba(14,12,10,0.04);
    }

    .card-editor.inactive {
      opacity: 0.5;
    }

    .card-editor__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .card-editor__label {
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--black);
    }

    .card-editor__badge {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      background: var(--blush-light);
      color: var(--blush-muted);
    }

    .card-editor__fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .card-editor__fields .full-width {
      grid-column: 1 / -1;
    }

    .field-group label {
      display: block;
      font-weight: 500;
      font-size: 0.7rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: rgba(14,12,10,0.5);
      margin-bottom: 0.3rem;
    }

    .field-group input,
    .field-group textarea {
      width: 100%;
      padding: 0.6rem 0.8rem;
      font-family: var(--font-body);
      font-size: 0.85rem;
      border: 1px solid rgba(14,12,10,0.12);
      background: var(--white);
      outline: none;
      transition: border-color 0.3s;
    }

    .field-group input:focus,
    .field-group textarea:focus {
      border-color: var(--blush-muted);
    }

    .field-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    /* Toggle switch */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
      cursor: pointer;
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: rgba(14,12,10,0.15);
      border-radius: 22px;
      transition: background 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s;
    }

    .toggle input:checked + .toggle-slider {
      background: var(--blush-muted);
    }

    .toggle input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    .toggle-label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(14,12,10,0.5);
    }

    /* Buttons */
    .btn {
      display: inline-block;
      font-family: var(--font-body);
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      padding: 1rem 3rem;
      border: none;
      cursor: pointer;
      transition: background 0.3s, color 0.3s, transform 0.2s;
    }

    .btn--primary {
      background: var(--blush);
      color: var(--black);
    }

    .btn--primary:hover {
      background: var(--blush-muted);
      color: var(--white);
      transform: translateY(-2px);
    }

    .btn--outline {
      background: transparent;
      color: var(--black);
      border: 1px solid rgba(14,12,10,0.2);
    }

    .btn--outline:hover {
      border-color: var(--blush-muted);
      color: var(--blush-muted);
    }

    .btn--danger {
      background: transparent;
      color: #c0392b;
      border: 1px solid rgba(192,57,43,0.3);
    }

    .btn--danger:hover {
      background: #c0392b;
      color: white;
    }

    .button-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 2rem;
    }

    .save-status {
      font-size: 0.8rem;
      font-weight: 500;
      color: #27ae60;
      margin-left: 1rem;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .save-status.visible { opacity: 1; }

    /* Preview */
    .preview-section {
      background: var(--blush-light);
      padding: 2rem;
      margin-top: 1rem;
    }

    .preview-label {
      font-weight: 600;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--blush-muted);
      margin-bottom: 1rem;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1rem;
    }

    .preview-card {
      background: var(--white);
      padding: 1.2rem;
      border: 1px solid rgba(14,12,10,0.06);
      text-align: center;
    }

    .preview-card__name {
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 0.3rem;
    }

    .preview-card__name a {
      color: var(--black);
      border-bottom: 1px solid var(--blush);
    }

    .preview-card__date {
      font-weight: 500;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--blush-muted);
      margin-bottom: 0.5rem;
    }

    .preview-card__desc {
      font-weight: 300;
      font-size: 0.75rem;
      color: rgba(14,12,10,0.6);
      line-height: 1.6;
    }

    .preview-empty {
      font-weight: 300;
      font-size: 0.85rem;
      color: rgba(14,12,10,0.4);
      font-style: italic;
      text-align: center;
      padding: 2rem;
    }

    @media (max-width: 768px) {
      .card-editor__fields { grid-template-columns: 1fr; }
      .preview-grid { grid-template-columns: 1fr; }
      .button-row { flex-direction: column; }
      .btn { text-align: center; }
    }
  </style>
</head>
<body>

  <!-- ===================== LOGIN SCREEN ===================== -->
  <div id="login-screen">
    <div class="login-box">
      <h1>Dogwood Photos</h1>
      <p>Admin Panel</p>
      <input type="password" id="password-input" placeholder="Enter password" autocomplete="off">
      <p class="login-error" id="login-error">Incorrect password. Please try again.</p>
      <button class="btn btn--primary" onclick="attemptLogin()" style="width: 100%;">Log In</button>
    </div>
  </div>

  <!-- ===================== ADMIN PANEL ===================== -->
  <div id="admin-panel">
    <div class="admin-header">
      <h1>Dogwood Admin</h1>
      <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>

    <div class="admin-container">

      <!-- Card Editors -->
      <div class="admin-section">
        <h2>Location Cards</h2>
        <p style="font-weight: 300; font-size: 0.85rem; color: rgba(14,12,10,0.5); margin-bottom: 1.5rem;">Cards 1&ndash;4 appear on the homepage. All active cards appear on the locations page.</p>
        <div id="card-editors"></div>
      </div>

      <!-- Action Buttons -->
      <div class="button-row">
        <button class="btn btn--primary" onclick="saveAndPublish()">Save &amp; Publish</button>
        <button class="btn btn--danger" onclick="resetToDefault()">Reset to Default</button>
        <span class="save-status" id="save-status">Changes saved &amp; published!</span>
      </div>

      <!-- Preview: Homepage -->
      <div class="admin-section" style="margin-top: 3rem;">
        <h2>Preview &mdash; Homepage (Cards 1&ndash;4)</h2>
        <div class="preview-section">
          <div class="preview-grid" id="preview-homepage"></div>
        </div>
      </div>

      <!-- Preview: Locations Page -->
      <div class="admin-section">
        <h2>Preview &mdash; Locations Page (All Active Cards)</h2>
        <div class="preview-section">
          <div class="preview-grid" id="preview-locations"></div>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ===================== DEFAULT DATA =====================
    const DEFAULT_CARDS = [
      {
        name: 'Wendell Falls',
        url: 'https://maps.google.com/?q=Wendell+Falls,+Wendell,+NC',
        date: 'Week of March 17',
        desc: 'A beautiful planned community with scenic walking paths, open green spaces, and gorgeous natural light. Perfect for families and couples.',
        active: true
      },
      {
        name: 'Wendell Falls',
        url: 'https://maps.google.com/?q=Wendell+Falls,+Wendell,+NC',
        date: 'Week of March 24',
        desc: 'A beautiful planned community with scenic walking paths, open green spaces, and gorgeous natural light. Perfect for families and couples.',
        active: true
      },
      {
        name: 'Oak View County Park',
        url: 'https://maps.google.com/?q=Oak+View+County+Park,+Garner,+NC',
        date: 'Week of March 31',
        desc: 'A charming historic farm setting with open fields, mature trees, and stunning golden hour light.',
        active: true
      },
      {
        name: 'Oak View County Park',
        url: 'https://maps.google.com/?q=Oak+View+County+Park,+Garner,+NC',
        date: 'Week of April 7',
        desc: 'A charming historic farm setting with open fields, mature trees, and stunning golden hour light.',
        active: true
      },
      {
        name: 'NC Museum of Art',
        url: 'https://maps.google.com/?q=North+Carolina+Museum+of+Art,+Raleigh,+NC',
        date: 'Week of April 14',
        desc: "One of Raleigh's most stunning outdoor settings \u2014 sculpture gardens, open lawns, and beautiful walking trails.",
        active: true
      },
      {
        name: 'NC Museum of Art',
        url: 'https://maps.google.com/?q=North+Carolina+Museum+of+Art,+Raleigh,+NC',
        date: 'Week of April 21',
        desc: "One of Raleigh's most stunning outdoor settings \u2014 sculpture gardens, open lawns, and beautiful walking trails.",
        active: true
      },
      { name: '', url: '', date: '', desc: '', active: false },
      { name: '', url: '', date: '', desc: '', active: false },
      { name: '', url: '', date: '', desc: '', active: false },
      { name: '', url: '', date: '', desc: '', active: false }
    ];

    const STORAGE_KEY = 'dogwood_location_cards';
    const AUTH_KEY = 'dogwood_admin_auth';
    const PASSWORD = 'DogwoodAdmin2026';

    // ===================== AUTH =====================
    function attemptLogin() {
      const input = document.getElementById('password-input');
      if (input.value === PASSWORD) {
        sessionStorage.setItem(AUTH_KEY, 'true');
        showAdmin();
      } else {
        document.getElementById('login-error').style.display = 'block';
        input.value = '';
        input.focus();
      }
    }

    // Allow Enter key to submit
    document.getElementById('password-input').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') attemptLogin();
    });

    function logout() {
      sessionStorage.removeItem(AUTH_KEY);
      location.reload();
    }

    function showAdmin() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadCards();
    }

    // Check if already authenticated
    if (sessionStorage.getItem(AUTH_KEY) === 'true') {
      showAdmin();
    }

    // ===================== CARD MANAGEMENT =====================
    function getCards() {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        try {
          const parsed = JSON.parse(stored);
          // Ensure we always have 10 cards
          while (parsed.length < 10) {
            parsed.push({ name: '', url: '', date: '', desc: '', active: false });
          }
          return parsed.slice(0, 10);
        } catch (e) {
          return JSON.parse(JSON.stringify(DEFAULT_CARDS));
        }
      }
      return JSON.parse(JSON.stringify(DEFAULT_CARDS));
    }

    function loadCards() {
      const cards = getCards();
      const container = document.getElementById('card-editors');
      container.innerHTML = '';

      cards.forEach((card, i) => {
        const homepageBadge = i < 4 ? '<span class="card-editor__badge">Homepage + Locations</span>' : '<span class="card-editor__badge">Locations Only</span>';

        const editor = document.createElement('div');
        editor.className = 'card-editor' + (card.active ? '' : ' inactive');
        editor.id = 'card-' + i;
        editor.innerHTML = `
          <div class="card-editor__header">
            <span class="card-editor__label">Card ${i + 1}</span>
            <div style="display: flex; align-items: center; gap: 1rem;">
              ${homepageBadge}
              <div class="toggle-wrapper">
                <label class="toggle">
                  <input type="checkbox" data-index="${i}" ${card.active ? 'checked' : ''} onchange="toggleCard(${i}, this.checked)">
                  <span class="toggle-slider"></span>
                </label>
                <span class="toggle-label">${card.active ? 'Active' : 'Inactive'}</span>
              </div>
            </div>
          </div>
          <div class="card-editor__fields">
            <div class="field-group">
              <label>Location Name</label>
              <input type="text" id="name-${i}" value="${escapeHtml(card.name)}" placeholder="e.g. Wendell Falls">
            </div>
            <div class="field-group">
              <label>Date Range</label>
              <input type="text" id="date-${i}" value="${escapeHtml(card.date)}" placeholder="e.g. Week of March 17">
            </div>
            <div class="field-group full-width">
              <label>Google Maps URL</label>
              <input type="text" id="url-${i}" value="${escapeHtml(card.url)}" placeholder="https://maps.google.com/?q=...">
            </div>
            <div class="field-group full-width">
              <label>Description</label>
              <textarea id="desc-${i}" placeholder="Short description of the location...">${escapeHtml(card.desc)}</textarea>
            </div>
          </div>
        `;
        container.appendChild(editor);
      });

      updatePreviews();
    }

    function toggleCard(index, checked) {
      const editor = document.getElementById('card-' + index);
      const label = editor.querySelector('.toggle-label');
      editor.classList.toggle('inactive', !checked);
      label.textContent = checked ? 'Active' : 'Inactive';
      updatePreviews();
    }

    function gatherCards() {
      const cards = [];
      for (let i = 0; i < 10; i++) {
        cards.push({
          name: document.getElementById('name-' + i).value.trim(),
          url: document.getElementById('url-' + i).value.trim(),
          date: document.getElementById('date-' + i).value.trim(),
          desc: document.getElementById('desc-' + i).value.trim(),
          active: document.querySelector(`#card-${i} input[type="checkbox"]`).checked
        });
      }
      return cards;
    }

    function saveAndPublish() {
      const cards = gatherCards();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
      const status = document.getElementById('save-status');
      status.classList.add('visible');
      setTimeout(() => status.classList.remove('visible'), 3000);
      updatePreviews();
    }

    function resetToDefault() {
      if (confirm('Reset all location cards to the default values? This cannot be undone.')) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(DEFAULT_CARDS));
        loadCards();
        const status = document.getElementById('save-status');
        status.textContent = 'Reset to defaults & published!';
        status.classList.add('visible');
        setTimeout(() => {
          status.classList.remove('visible');
          status.textContent = 'Changes saved & published!';
        }, 3000);
      }
    }

    // ===================== PREVIEWS =====================
    function updatePreviews() {
      const cards = gatherCards();
      renderPreview('preview-homepage', cards.filter((c, i) => i < 4 && c.active && c.name));
      renderPreview('preview-locations', cards.filter(c => c.active && c.name));
    }

    function renderPreview(containerId, cards) {
      const container = document.getElementById(containerId);
      if (cards.length === 0) {
        container.innerHTML = '<p class="preview-empty">No active cards to display</p>';
        return;
      }
      container.innerHTML = cards.map(card => `
        <div class="preview-card">
          <p class="preview-card__name">${card.url ? `<a href="${escapeHtml(card.url)}" target="_blank" rel="noopener">${escapeHtml(card.name)}</a>` : escapeHtml(card.name)}</p>
          <p class="preview-card__date">${escapeHtml(card.date)}</p>
          <p class="preview-card__desc">${escapeHtml(card.desc)}</p>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Update previews on any input change
    document.addEventListener('input', function(e) {
      if (e.target.closest('.card-editor')) {
        updatePreviews();
      }
    });
  </script>
</body>
</html>
